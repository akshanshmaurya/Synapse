# ============================================================================
# Synapse Backend — Project Configuration
# ============================================================================

[tool.ruff]
target-version = "py311"
line-length = 140
src = ["app", "tests"]

[tool.ruff.lint]
select = [
    "E4",    # import errors
    "E7",    # statement errors
    "E9",    # runtime errors
    "F",     # pyflakes (undefined names, unused imports)
    "S",     # flake8-bandit (security)
]
ignore = [
    "S101",  # allow assert in tests
    "S105",  # token_type="access" is not a password
    "S106",  # allow hardcoded passwords in test helpers
    "S107",  # allow default password params in test helpers  
    "S603",  # allow subprocess calls
    "S607",  # allow partial executable path
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S106", "F401"]
"app/agents/**/*.py" = ["E501", "F401", "F841", "E722", "S311"]
"app/services/**/*.py" = ["E501", "F401", "F841", "E722", "S311", "S113"]
"app/routes/**/*.py" = ["F401", "F841"]
"app/models/**/*.py" = ["F401"]
"app/main.py" = ["E402", "F401"]
"app/db/**/*.py" = ["F401"]
"app/core/**/*.py" = ["F401", "F841"]
"app/auth/**/*.py" = ["F401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "requires_db: tests that need a live MongoDB connection",
]

[tool.coverage.run]
source = ["app"]
omit = ["app/services/dashboard_service.py"]

[tool.coverage.report]
show_missing = true
fail_under = 30

[tool.black]
line-length = 120
target-version = ["py311"]
