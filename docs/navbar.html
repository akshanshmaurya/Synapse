<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&family=Space+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --stone-base: #f4f4f0;
            --stone-shadow: #d8d8ce;
            --stone-highlight: #ffffff;
            --stone-accent: #2d2d2b;
            --grain-opacity: 0.06;
            --transition-smooth: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #efefe9;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* The Grain Overlay */
        .limestone-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: var(--grain-opacity);
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .nav-wrapper {
            position: relative;
            padding: 2rem 4rem;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .navbar {
            display: flex;
            align-items: stretch;
            background: var(--stone-base);
            padding: 0;
            position: relative;
            width: 100%;
            max-width: 1400px;
            box-shadow:
                20px 20px 60px #d9d9d1,
                -20px -20px 60px #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: navReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes navReveal {
            from {
                opacity: 0;
                transform: translateY(-20px) scaleX(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scaleX(1);
            }
        }

        /* Chiseled Geometry Logo */
        .logo-block {
            padding: 2rem 3rem;
            background: var(--stone-accent);
            color: var(--stone-base);
            display: flex;
            align-items: center;
            gap: 1rem;
            clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .logo-block:hover {
            padding-right: 4rem;
            background: #000;
        }

        .logo-type {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.04em;
            text-transform: uppercase;
        }

        /* Nav Links Section */
        .nav-links {
            display: flex;
            flex-grow: 1;
            align-items: center;
            padding: 0 2rem;
        }

        .nav-item {
            position: relative;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            text-decoration: none;
            color: var(--stone-accent);
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: var(--transition-smooth);
            overflow: hidden;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 4px;
            background: var(--stone-accent);
            transition: var(--transition-smooth);
            transform: translateX(-50%);
        }

        .nav-item:hover {
            background: rgba(216, 216, 206, 0.3);
        }

        .nav-item:hover::before {
            width: 100%;
        }

        .nav-item .index {
            font-size: 0.6rem;
            margin-right: 0.5rem;
            opacity: 0.4;
        }

        /* Action Group */
        .nav-actions {
            display: flex;
            align-items: center;
            padding: 0 2rem;
            gap: 2rem;
        }

        .time-display {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: #8a8a7e;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        .cta-button {
            border: 1px solid var(--stone-accent);
            padding: 0.8rem 1.5rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            background: transparent;
            transition: var(--transition-smooth);
            z-index: 1;
        }

        .cta-button::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 100%;
            background: var(--stone-accent);
            z-index: -1;
            transition: var(--transition-smooth);
        }

        .cta-button:hover {
            color: var(--stone-base);
        }

        .cta-button:hover::after {
            width: 100%;
        }

        /* Geometric Accents */
        .nav-divider {
            width: 1px;
            height: 30px;
            background: var(--stone-shadow);
            align-self: center;
        }

        @media (max-width: 900px) {

            .nav-links,
            .time-display {
                display: none;
            }

            .nav-wrapper {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>

    <div class="limestone-texture"></div>

    <div class="nav-wrapper">
        <nav class="navbar">
            <div class="logo-block">
                <div class="logo-type">Monolith</div>
            </div>

            <div class="nav-links">
                <a href="#" class="nav-item">
                    <span class="index">01</span>
                    Architecture
                </a>
                <a href="#" class="nav-item">
                    <span class="index">02</span>
                    Process
                </a>
                <a href="#" class="nav-item">
                    <span class="index">03</span>
                    Quarry
                </a>
                <a href="#" class="nav-item">
                    <span class="index">04</span>
                    Archive
                </a>
            </div>

            <div class="nav-divider"></div>

            <div class="nav-actions">
                <div class="time-display">
                    <span style="letter-spacing: 0.2em;">SYSTEM READY</span>
                    <span>14:32 GMT <span class="status-dot"></span></span>
                </div>
                <button class="cta-button">Initiate</button>
            </div>
        </nav>
    </div>

    <script>
        // Subtle Mouse parallax on navbar
        const nav = document.querySelector('.navbar');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 100;
            const y = (window.innerHeight / 2 - e.pageY) / 100;
            nav.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        // Reveal effect for nav items
        const items = document.querySelectorAll('.nav-item');
        items.forEach((item, index) => {
            item.style.opacity = '0';
            item.style.transform = 'translateY(10px)';
            setTimeout(() => {
                item.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
                item.style.opacity = '1';
                item.style.transform = 'translateY(0)';
            }, 300 + (index * 100));
        });
    </script>
</body>

</html>
